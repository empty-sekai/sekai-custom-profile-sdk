# Emscripten linker contract for the semantic browser runtime.
# The browser worker owns this module; rendering is performed by WebGL2.
[target.wasm32-unknown-emscripten]
rustflags = [
  "-C", "link-arg=-sMODULARIZE=1",
  "-C", "link-arg=-sEXPORT_ES6=1",
  "-C", "link-arg=-sEXPORT_NAME=createAlliumRenderer",
  "-C", "link-arg=-sALLOW_MEMORY_GROWTH=1",
  "-C", "link-arg=-sSUPPORT_LONGJMP=wasm",
  "-C", "link-arg=-sENVIRONMENT=web,worker,node",
  "-C", "link-arg=-sEXPORTED_FUNCTIONS=_main,_malloc,_free,_sdf_layout_freetype_probe,_sdf_layout_freetype_contract_json,_sdf_layout_freetype_map_glyphs_json,_sdf_layout_freetype_build_glyph_json,_sdf_layout_freetype_build_glyph_json_edt,_sdf_layout_freetype_build_mask_json,_sdf_layout_freetype_build_layout_json,_sdf_renderer_core_scene_create_json,_sdf_renderer_core_profile_scene_create_json,_sdf_renderer_core_scene_advance_json,_sdf_renderer_core_scene_advance_binary,_sdf_renderer_core_scene_set_mask_json,_sdf_renderer_core_scene_set_masks_json,_sdf_renderer_core_scene_set_tab_json,_sdf_renderer_core_scene_scroll_json,_sdf_renderer_core_scene_dump_json,_sdf_renderer_core_scene_destroy,_sdf_renderer_core_resolve_locale_json,_sdf_renderer_core_resolve_profile_json,_sdf_layout_freetype_free_string",
  "-C", "link-arg=-sEXPORTED_RUNTIME_METHODS=ccall,cwrap,UTF8ToString,HEAPU8,HEAPU32",
  "-C", "link-arg=-sEXIT_RUNTIME=0",
]
