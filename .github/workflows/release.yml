name: release

# Triggered by a v* tag (real release) or manual dispatch (dry-run: builds
# and deploys the demo, but never publishes to npm or cuts a GitHub Release).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# One release run per ref; a re-pushed tag cancels the stale run.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # -- 1. Lint + tests. Gates everything else. ----------------------
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev libfreetype6-dev libssl-dev pkg-config

      - run: cargo fmt --all -- --check
      # Engine crates set #![deny(...)] lints; cap them at warn so pre-existing
      # lints don't gate the release without touching engine source.
      - run: cargo clippy --workspace --lib --tests -- --cap-lints warn
      - run: cargo test --workspace --lib

  # -- 2. Linux render-card binary. ---------------------------------
  build:
    name: build render-card
    needs: test
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev libfreetype6-dev libssl-dev pkg-config

      - name: Build render-card
        run: cargo build --release -p allium-renderer-cli

      - name: Stage binary
        run: cp "target/release/render-card" "render-card-${TARGET}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: render-card-${{ env.TARGET }}
          path: render-card-${{ env.TARGET }}
          if-no-files-found: error

  # -- 3. wasm build + npm package. ---------------------------------
  wasm:
    name: build wasm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Build wasm in container
        run: bash crates/allium-renderer-wasm/build.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build TypeScript wrapper
        working-directory: crates/allium-renderer-wasm
        run: |
          npm install --no-audit --no-fund
          npm run build:ts

      - name: Verify package contents
        working-directory: crates/allium-renderer-wasm
        run: |
          ls -la dist/
          test -f dist/allium_renderer_wasm.wasm
          test -f dist/allium_renderer_wasm.js
          test -f dist/index.js
          test -f dist/worker.js
          test -f dist/worker-client.js
          npm pack --dry-run

      - name: Upload wasm dist
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: crates/allium-renderer-wasm/dist/
          if-no-files-found: error

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: crates/allium-renderer-wasm
        run: |
          npm install -g npm@latest
          VERSION="${GITHUB_REF_NAME#v}"
          npm version --no-git-tag-version "$VERSION"
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            npm publish --access public --provenance --tag next
          else
            npm publish --access public --provenance
          fi

  # -- 4. GitHub Pages: demo + wasm dist. ---------------------------
  pages:
    name: deploy demo
    needs: wasm
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download wasm dist
        uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: public/dist

      - name: Copy demo into site
        run: cp -r crates/allium-renderer-wasm/demo public/demo

      - name: Write root landing page
        run: |
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./demo/" />
              <title>allium-renderer</title>
            </head>
            <body>
              <p>Redirecting to the <a href="./demo/">layer viewer demo</a>.</p>
            </body>
          </html>
          HTML

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4

  # -- 5. GitHub Release: binary + wasm zip + checksums. ------------
  # CHANGELOG is generated fresh and used as the release body only --
  # nothing is committed back to the repo.
  release:
    name: github release
    needs: [build, wasm, pages]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install git-cliff
        run: cargo install git-cliff --locked --version 2.6.1

      - name: Generate release notes
        run: |
          git-cliff --latest --strip all --output RELEASE_NOTES.md
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release assets
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          # render-card binary (artifact name == file name)
          cp artifacts/render-card-*/render-card-* dist/
          # wasm browser runtime, bundled as a zip
          (cd artifacts/wasm-dist && zip -j \
            "../../dist/allium-renderer-wasm-${VERSION}.zip" \
            allium_renderer_wasm.js allium_renderer_wasm.wasm)
          (cd dist && sha256sum * > SHA256SUMS)
          ls -la dist
          cat dist/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
